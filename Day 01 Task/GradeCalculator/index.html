<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>

    <style>
        body {
            background-color: rgb(107, 219, 244);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: rgb(245, 241, 241);
            padding: 20px;
            border: 2px solid black;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }
         input {
            width: 80%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }


    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>

    <input type="number" id="marks" placeholder="Enter Marks (0-100)">
    <br>

    <button onclick="calculateGrade()">Calculate Grade</button>

    <h3 id="resultBox">Grade: </h3>
</div>

<script src="code.js"></script>

</body>
</html>
