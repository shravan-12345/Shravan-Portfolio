<!DOCTYPE html>
<html>
<head>
    <title>Interest Calculator</title>

    <style>
        body {
            background-color: rgb(241, 117, 131);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background-color: rgba(255, 255, 255, 0.823);
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 8px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #resultBox {
            width: 300px;
            height: 50px;
            border: 2px solid black;
            border-radius: 5px;
            background-color: #f2f2f2;
            margin: 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Interest Calculator</h2>

        <input type="number" id="principal" placeholder="Enter Principal Amount"><br>

        <input type="number" id="rate" placeholder="Enter Rate (%)"><br>

        <input type="number" id="time" placeholder="Enter Time (Years)"><br>

        <button onclick="calculateSI()">Simple Interest</button>
        <button onclick="calculateCI()">Compound Interest</button>

        <div id="resultBox">Result</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
