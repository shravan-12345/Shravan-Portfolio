<!DOCTYPE html>
<html>
<head>
    <title>Word Counter</title>

    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 500px;
            background-color: white;
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
            text-align: center;
        }

        textarea {
            width: 90%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #resultBox {
            width: 350px;
            min-height: 100px;
            border: 2px solid black;
            border-radius: 5px;
            background-color: #f2f2f2;
            margin: 15px auto;
            padding: 10px;
            font-size: 18px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Word Counter</h2>

        <textarea id="sentence" placeholder="Enter a sentence"></textarea>
        <br>

        <button onclick="countText()">Count</button>

        <div id="resultBox">
            Result will appear here
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
