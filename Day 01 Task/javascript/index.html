<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>

    <style>
        body {
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 350px;
            padding: 25px;
            background-color: white;
            border: 2px solid black;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: blue;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 15px;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Temperature Converter</h2>

        <label>Enter Temperature:</label><br><br>

        <input type="number" id="temp" placeholder="Enter value">

        <br><br>

        <button onclick="celsiusToFahrenheit()">
            Celsius → Fahrenheit
        </button>

        <button onclick="fahrenheitToCelsius()">
            Fahrenheit → Celsius
        </button>

        <h3 id="result"></h3>
    </div>

    <script src="first.js"></script>

</body>
</html>
