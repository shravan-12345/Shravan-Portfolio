<!DOCTYPE html>
<html>
<head>
    <title>ATM Withdrawal Simulation</title>

     <style>
        body {
            background-color: rgb(9, 158, 207);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgb(246, 198, 198);
            padding: 25px;
            border: 2px solid black;
            border-radius: 10px;
            text-align: center;
            width: 320px;
        }
        </style>

</head>
<body>

<div class="container">
    <h2>ATM Withdrawal Simulation</h2>

    <label>Current Balance:</label>
    <input type="number" id="balance" placeholder="Enter Balance">
    <br><br>

    <label>Withdraw Amount:</label>
    <input type="number" id="amount" placeholder="Enter Amount">
    <br><br>

    <button onclick="withdraw()">Withdraw</button>

    <h3 id="result"></h3>

    <script src="code.js"></script>

</body>
</html>
