<!DOCTYPE html>
<html>
<head>
    <title>Math Utility Functions</title>
    <style>
        body {
           background-color: lightblue;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: rgb(240, 243, 151);
            border: 2px solid black;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 450px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 120px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #resultBox {
            width: 300px;
            height: 60px;
            border: 2px solid black;
            border-radius: 5px;
            background-color: rgb(248, 219, 219);
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
    <h2>Math Utility Functions</h2>

    <input type="number" id="num1" placeholder="Enter Number 1">
    <input type="number" id="num2" placeholder="Enter Number 2">

    <br><br>

    <button onclick="showResult(add())">Add</button>
    <button onclick="showResult(subtract())">Subtract</button>
    <button onclick="showResult(multiply())">Multiply</button>
    <button onclick="showResult(divide())">Divide</button>

    <br><br>

    <button onclick="showResult(square())">Square</button>
    <button onclick="showResult(cube())">Cube</button>
    <button onclick="showResult(factorial())">Factorial</button>

    <div id="resultBox">Result</div>

  </div>
    <script src="maths.js"></script>

</body>
</html>
