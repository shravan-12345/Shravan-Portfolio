<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#69ebf5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            width:400px;
            text-align:center;
        }

        input{
            width:80%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 15px;
            margin:5px;
            cursor:pointer;
        }

        #salaryList{
            margin-top:10px;
            font-weight:bold;
        }

        #result{
            margin-top:15px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Salary Calculator</h2>

    <input type="number" id="salary" placeholder="Enter Employee Salary">

    <br>

    <button onclick="addSalary()">Add Salary</button>
    <button onclick="calculateSalary()">Calculate</button>

    <div id="salaryList"></div>

    <div id="result"></div>
</div>

<script src="array.js"></script>

</body>
</html>
