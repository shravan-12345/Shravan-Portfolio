<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Viewer</title>
    <link rel="stylesheet" href="style.css">
    <style>
       body {
    font-family: Arial, sans-serif;
    background-color: #f9dede;
    margin: 0;
    padding: 20px;
}

.container {
    width: 80%;
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    color: #202020;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 20px;
}

button:hover {
    background-color: #0056b3;
}

#posts {
    margin-top: 20px;
}

.post {
    background: #f9f9f9;
    border: 1px solid #181818;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    text-align: left;
}

.post h3 {
    color: #007bff;
    margin-bottom: 10px;
}

.post p {
    color: #3e3e3e;
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Post Viewer</h1>
        <button onclick="loadPosts()">Load Posts</button>
        <div id="posts"></div>
    </div>

    <script src="array.js"></script>
</body>
</html>
