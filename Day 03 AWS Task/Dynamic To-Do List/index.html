<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic To-Do List</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:#111111;
    }

    .container{
        width:600px;
        background:#fff;
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
        color:#333;
    }

    .input-section{
        display:flex;
        justify-content:center;
        gap:10px;
        margin-bottom:15px;
    }

    input{
        width:70%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    .add-btn{
        background:green;
        color:white;
        border:none;
        padding:10px 15px;
        border-radius:5px;
        cursor:pointer;
    }

    #message{
        font-weight:bold;
        color:green;
        margin-bottom:15px;
    }

    ul{
        list-style:none;
    }

    li{
        background:#f1f1f1;
        margin:10px 0;
        padding:12px;
        border-radius:6px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .completed{
        text-decoration:line-through;
        color:green;
        font-weight:bold;
    }

    .btn-group button{
        padding:6px 10px;
        border:none;
        border-radius:4px;
        cursor:pointer;
        margin-left:5px;
        color:white;
    }

    .complete-btn{
        background:blue;
    }

    .delete-btn{
        background:red;
    }

    .info{
        margin-top:15px;
        background:#eef;
        padding:10px;
        border-radius:5px;
        font-weight:bold;
    }
</style>

</head>
<body>

<div class="container">

    <h2> Dynamic To-Do List</h2>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter Task">
        <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>

    <p id="message"></p>

    <ul id="taskList"></ul>

    <div class="info">
        Total Tasks: <span id="totalTasks">0</span> |
        Completed Tasks: <span id="completedTasks">0</span>
    </div>

</div>

<script src="array.js"></script>

</body>
</html>
