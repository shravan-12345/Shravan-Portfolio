<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling Practice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #64fadc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 400px;
    background: white;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid black;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(11, 11, 11, 0.2);
}
button {
    padding: 10px 20px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #0056b3;
}
#loading {
    margin-top: 15px;
    color: orange;
    font-weight: bold;
}
#error {
    color: red;
    font-weight: bold;
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Error Handling Practice</h1>

        <button onclick="fetchData()">Fetch Data</button>

        <p id="loading"></p>
        <p id="message"></p>
    </div>

    <script src="array.js"></script>
</body>
</html>
