<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s ease;
        }

        .container {
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        .buttons {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Light Theme */
        .light-theme {
            background-color: #f5f5f5;
            color: #222;
        }

        .light-theme .container {
            background-color: white;
        }

        /* Dark Theme */
        .dark-theme {
            background-color: #1e1e1e;
            color: white;
        }

        .dark-theme .container {
            background-color: #2d2d2d;
        }

        #lightBtn {
            background-color: #ffc107;
            color: black;
        }

        #darkBtn {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Theme Switcher</h1>

        <div class="buttons">
            <button id="lightBtn">☀ Light Mode</button>
            <button id="darkBtn">🌙 Dark Mode</button>
        </div>

        <h2 id="themeText">Current Theme: Light Mode</h2>
    </div>

    <script src="array.js"></script>

</body>
</html>
