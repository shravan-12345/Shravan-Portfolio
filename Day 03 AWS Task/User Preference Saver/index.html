<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Preference Saver</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#121212;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
            border:1px solid #080707;
            border-radius:5px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }

        .output{
            margin-top:20px;
            padding:15px;
            background:#f8f9fa;
            border-radius:5px;
            border:1px solid #ddd;
        }

        .output h3{
            color:#007bff;
            margin-bottom:10px;
        }

        .output p{
            font-size:18px;
            color:#333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>User Preference Saver</h2>

        <input type="text" id="username" placeholder="Enter Username">

        <button onclick="saveUsername()">Save Username</button>

        <div id="result" class="output">
            <h3>Saved User Details</h3>
            <p>No Username Saved Yet</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
