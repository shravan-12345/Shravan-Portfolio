<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random User Fetcher</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f067f7;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:700px;
        background:rgb(250, 250, 250);
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
        color:#333;
    }

    button{
        padding:10px 20px;
        border:none;
        background:#007bff;
        color:white;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
        margin-bottom:20px;
    }

    button:hover{
        background:#0056b3;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:15px;
    }

    th, td{
        border:1px solid #ddd;
        padding:10px;
        text-align:center;
    }

    th{
        background:#007bff;
        color:white;
    }

    tr:nth-child(even){
        background:#f9f9f9;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Random User Fetcher</h2>

    <button onclick="fetchUsers()">Fetch Users</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody id="userData">
            <tr>
                <td colspan="3">Click "Fetch Users" to Load Data</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="array.js"></script>

</body>
</html>
