<!DOCTYPE html>
<html>
<head>
    <title>Student Object Operations</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: rgb(1, 11, 14);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 600px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: green;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: darkgreen;
        }

        #result{
            margin-top: 15px;
            padding: 15px;
            border: 2px solid black;
            background-color: #f2f2f2;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Object Operations</h2>

    <button onclick="displayStudent()">Display Student</button>

    <br><br>

    <input type="number" id="newMarks" placeholder="Enter New Marks">
    <button onclick="updateMarks()">Update Marks</button>

    <br><br>

    <input type="text" id="propertyName" placeholder="Property Name">
    <input type="text" id="propertyValue" placeholder="Property Value">
    <button onclick="addProperty()">Add Property</button>

    <br><br>

    <input type="text" id="deleteProperty" placeholder="Property To Delete">
    <button onclick="deleteProperty()">Delete Property</button>

    <div id="result">
        Student details here
    </div>

</div>

<script src="array.js"></script>

</body>
</html>
