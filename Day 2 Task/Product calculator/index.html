<!DOCTYPE html>
<html>
<head>
    <title>Product Price Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(244, 227, 118);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            border-color: rgb(8, 0, 0);
            text-align: center;
            width: 400px;
            box-shadow: 0px 0px 10px rgb(162, 162, 162);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        #resultBox {
            width: 90%;
            margin: 12px auto;
            padding: 14px;
            border: 2px solid rgb(15, 14, 14);
            border-radius: 5px;
            background-color: #f2f2f2;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Product Price Calculator</h2>

        <input type="text" id="prices" placeholder="100,200,300,400">

        <br><br>

        <button onclick="calculatePrice()">Calculate</button>

        <div id="resultBox">
            Show Result here...
        </div>
    </div>

    <script src="array.js"></script>

</body>
</html>
