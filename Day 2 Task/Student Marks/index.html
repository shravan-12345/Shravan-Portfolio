<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Analysis</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: rgb(85, 192, 28);
        }

        .container{
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgb(239, 232, 232);
            border: 2px solid rgb(20, 19, 19);
            border-radius: 10px;
        }

        input{
            width: 200px;
            padding: 8px;
            margin: 5px;
        }

        button{
            padding: 10px 20px;
            margin-top: 10px;
        }

        #result{
            margin-top: 20px;
            border: 2px solid rgb(19, 19, 19);
            padding: 10px;
            background-color: #ecc904;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Marks Analysis</h2>

    <input type="number" id="m1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="m2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="m3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="m4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="m5" placeholder="Subject 5 Marks"><br>

    <button onclick="analyzeMarks()">Analyze</button>

    <div id="result">
        Result will appear here...
    </div>

</div>

<script src="array.js"></script>

</body>
</html>
