<!DOCTYPE html>
<html>
<head>
    <title>Even and Odd Number Filter</title>

    <style>
        body {
            background-color: rgb(52, 198, 247);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 25px;
            border: 2px solid black;
            border-radius: 10px;
            text-align: center;
            width: 450px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: rgb(6, 117, 6);
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: rgb(3, 168, 3);
        }

        .result-box {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
            background-color: #f5f5f5;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Even and Odd Number Filter</h2>

        <label>Enter Numbers (comma separated)</label><br>
        <input type="text" id="numbers" placeholder="10,15,22,37,40">

        <br>
        <button onclick="filterNumbers()">Show Result</button>

        <div class="result-box">
            <p id="original"></p>
            <p id="even"></p>
            <p id="odd"></p>
        </div>
    </div>

    <script src="array.js"></script>

</body>
</html>
