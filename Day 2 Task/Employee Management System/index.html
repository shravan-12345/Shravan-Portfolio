<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(5, 8, 8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            width: 700px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 150px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: rgb(6, 64, 240);
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(4, 190, 29);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background-color: #0bbd11;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
        }

        #message {
            margin-top: 10px;
            font-weight: bold;
            color: rgb(1, 1, 10);
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Employee Management System</h2>

    <input type="number" id="empId" placeholder="Employee ID">
    <input type="text" id="empName" placeholder="Employee Name">

    <br>
    <input type="text" id="department" placeholder="Department">
    <input type="number" id="salary" placeholder="Salary">

    <br>

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="removeEmployee()">Remove Employee</button>

    <br><br>

    <input type="number" id="searchId" placeholder="Search Employee ID">
    <br>

    <button onclick="searchEmployee()">Search Employee</button>
    <button onclick="displayEmployees()">Display All Employees</button>

    <div id="message"></div>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="arrey.js"></script>

</body>
</html>
