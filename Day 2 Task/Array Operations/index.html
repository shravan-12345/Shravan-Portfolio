<!DOCTYPE html>
<html>
<head>
    <title>Array Operations</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: rgb(14, 13, 13);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: rgb(255, 253, 253);
            padding: 20px;
            border: 2px solid rgb(251, 249, 249);
            border-radius: 10px;
            text-align: center;
            width: 500px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #result{
            margin-top: 15px;
            padding: 10px;
            border: 2px solid black;
            min-height: 100px;
            background-color: #f5f5f5;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Array Operations</h2>

    <button onclick="showArray()">Show Array</button>
    <button onclick="addElement()">Push</button>
    <button onclick="removeElement()">Pop</button>
    <button onclick="addFirst()">Unshift</button>
    <button onclick="removeFirst()">Shift</button>

    <div id="result"></div>
</div>

<script src="array.js">

</script>

</body>
</html>
